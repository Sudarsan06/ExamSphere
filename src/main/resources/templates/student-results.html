<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Results</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: #f3f4f6;
        }

        .header {
            background: #1e3a8a;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #f9fafb;
        }

    </style>

</head>
<body>

<div class="header">
    <h1>My Results</h1>
</div>

<div class="container">

    <div class="card">

        <table>

            <thead>
                <tr>
                    <th>Exam</th>
                    <th>Score</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="result : ${results}">

                    <td th:text="${result.examTitle}"></td>

                    <td>
                        <span th:text="${result.score}"></span>
                        /
                        <span th:text="${result.totalMarks}"></span>
                    </td>

                    <td th:text="${result.submittedAt}"></td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
