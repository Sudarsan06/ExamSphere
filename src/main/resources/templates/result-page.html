<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Exam Result</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: #f3f4f6;
        }

        .container {
            max-width: 700px;
            margin: 100px auto;
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            color: #059669;
        }

        .score {
            font-size: 70px;
            font-weight: bold;
            margin: 30px 0;
            color: #1e3a8a;
        }

        .btn {
            display: inline-block;
            padding: 14px 30px;
            background: #059669;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Exam Submitted Successfully</h1>

    <p>Your Score</p>

    <div class="score">
        <span th:text="${score}"></span>
        /
        <span th:text="${totalMarks}"></span>
    </div>

    <a href="/login" class="btn">
        Logout
    </a>

</div>

</body>
</html>
