<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ExamSphere - Verify OTP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #e8f5ef;
            --green:      #2dd882;
            --green-dark: #1ab866;
            --ink:        #0d0d0d;
            --ink-soft:   #3a3a3a;
            --muted:      #6b7a72;
            --surface:    #ffffff;
            --border:     #c8dfd4;
            --error:      #d93025;
            --error-bg:   #fef2f2;
            --success:    #166534;
            --success-bg: #f0fdf4;
            --radius:     12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            /* subtle dot grid matching the site texture */
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 28px 28px;
            background-color: var(--bg);
        }

        /* Logo above card */
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.03em;
            margin-bottom: 24px;
        }

        .logo .green { color: var(--green-dark); }

        /* Card */
        .card {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            padding: 40px 36px 36px;
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            animation: up 0.45s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes up {
            from { opacity:0; transform:translateY(18px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* Icon at top */
        .icon-wrap {
            width: 52px; height: 52px;
            background: var(--bg);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 1.5px solid var(--border);
        }

        .icon-wrap svg {
            width: 26px; height: 26px;
            color: var(--green-dark);
        }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.03em;
            text-align: center;
            margin-bottom: 6px;
        }

        .card-sub {
            font-size: 13.5px;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* Alert boxes */
        .alert {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            margin-bottom: 22px;
        }

        .alert svg { width: 16px; height: 16px; flex-shrink: 0; }

        .alert-error   { background: var(--error-bg);   color: var(--error);   border: 1px solid rgba(217,48,37,0.18); }
        .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(22,101,52,0.18); }

        /* OTP inputs */
        label {
            display: block;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--ink-soft);
            margin-bottom: 10px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        /* Hidden real input for form submission */
        .otp-hidden {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* Visible 6-box OTP UI */
        .otp-boxes {
            display: flex;
            gap: 8px;
            margin-bottom: 26px;
            justify-content: center;
        }

        .otp-box {
            width: 50px; height: 56px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            text-align: center;
            background: var(--surface);
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
            caret-color: var(--green-dark);
        }

        .otp-box:focus {
            border-color: var(--green-dark);
            box-shadow: 0 0 0 4px rgba(26,184,102,0.12);
        }

        .otp-box.filled {
            border-color: var(--green-dark);
            background: var(--success-bg);
        }

        /* Submit button — black pill like the site */
        .btn {
            width: 100%;
            padding: 13px 20px;
            background: var(--ink);
            color: #fff;
            border: none;
            border-radius: 100px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.16);
            letter-spacing: 0.01em;
        }

        .btn:hover {
            background: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(0,0,0,0.2);
        }

        .btn:active { transform: translateY(0); }

        .btn svg {
            width: 16px; height: 16px;
            transition: transform 0.18s;
        }

        .btn:hover svg { transform: translateX(3px); }

        /* Resend / back row */
        .footer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
        }

        .footer-row a {
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.15s;
        }

        .footer-row a:hover { color: var(--ink); }

        .resend-btn {
            font-size: 13px;
            font-weight: 600;
            color: var(--green-dark);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.15s;
        }

        .resend-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .timer { font-size: 13px; color: var(--muted); }
    </style>
</head>
<body>

    <div class="logo">Exam<span class="green">Sphere</span></div>

    <div class="card">

        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 8l7.89 5.26a2 2 0 0 0 2.22 0L21 8M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/>
            </svg>
        </div>

        <h1 class="card-title">Check your email</h1>
        <p class="card-sub">We sent a 6-digit code to your email address.<br>Enter it below to verify your account.</p>

        <!-- Thymeleaf alerts -->
        <div th:if="${error}" class="alert alert-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span th:text="${error}">Invalid OTP. Please try again.</span>
        </div>
        <div th:if="${success}" class="alert alert-success">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span th:text="${success}">Verified successfully!</span>
        </div>

        <form action="/verify-otp" method="post" id="otpForm">
            <label>OTP Code</label>

            <!-- Hidden input that actually gets submitted -->
            <input type="hidden" name="otp" id="otpHidden">

            <!-- Visual 6-box UI -->
            <div class="otp-boxes">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            </div>

            <button type="submit" class="btn">
                Verify & Continue
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </form>

        <div class="footer-row">
            <a href="/register">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Register
            </a>
            <span>
                <span class="timer" id="timer">Resend in 30s</span>
				<button type="button"
				        class="resend-btn"
				        id="resendBtn"
				        disabled
				        onclick="resendOtp()">

				    Resend code

				</button>
            </span>
        </div>

    </div>

    <script>
        // ── OTP box logic ──
        const boxes = document.querySelectorAll('.otp-box');
        const hidden = document.getElementById('otpHidden');
        const form   = document.getElementById('otpForm');

        boxes.forEach((box, i) => {
            box.addEventListener('input', e => {
                const val = e.target.value.replace(/\D/g, '');
                box.value = val;
                box.classList.toggle('filled', val.length === 1);
                if (val && i < boxes.length - 1) boxes[i + 1].focus();
                syncHidden();
            });

            box.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !box.value && i > 0) {
                    boxes[i - 1].value = '';
                    boxes[i - 1].classList.remove('filled');
                    boxes[i - 1].focus();
                    syncHidden();
                }
            });

            // Allow paste on any box
            box.addEventListener('paste', e => {
                e.preventDefault();
                const pasted = (e.clipboardData || window.clipboardData)
                    .getData('text').replace(/\D/g, '').slice(0, 6);
                pasted.split('').forEach((ch, idx) => {
                    if (boxes[idx]) {
                        boxes[idx].value = ch;
                        boxes[idx].classList.add('filled');
                    }
                });
                const next = Math.min(pasted.length, boxes.length - 1);
                boxes[next].focus();
                syncHidden();
            });
        });

        function syncHidden() {
            hidden.value = [...boxes].map(b => b.value).join('');
        }

        form.addEventListener('submit', e => {
            syncHidden();
            if (hidden.value.length < 6) {
                e.preventDefault();
                boxes[hidden.value.length]?.focus();
            }
        });

        // ── Resend timer ──
        const timerEl  = document.getElementById('timer');
        const resendBtn = document.getElementById('resendBtn');
        let countdown;

        function startTimer() {
            let secs = 30;
            timerEl.style.display  = 'inline';
            resendBtn.style.display = 'none';
            resendBtn.disabled = true;
            timerEl.textContent = `Resend in ${secs}s`;
            clearInterval(countdown);
            countdown = setInterval(() => {
                secs--;
                if (secs <= 0) {
                    clearInterval(countdown);
                    timerEl.style.display  = 'none';
                    resendBtn.style.display = 'inline';
                    resendBtn.disabled = false;
                } else {
                    timerEl.textContent = `Resend in ${secs}s`;
                }
            }, 1000);
        }

		startTimer();
		boxes[0].focus();

		async function resendOtp() {

		    try {

		        resendBtn.disabled = true;

		        const response = await fetch(
		            '/resend-otp',
		            {
		                method: 'POST'
		            }
		        );

		        const message =
		                await response.text();

		        // OPTIONAL SUCCESS MESSAGE
		        alert(message);

		        // restart countdown
		        startTimer();

		    } catch (error) {

		        alert('Failed to resend OTP');

		        console.error(error);

		        resendBtn.disabled = false;
		    }
		}
    </script>
</body>
</html>
