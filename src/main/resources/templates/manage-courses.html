<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ExamSphere – Manage Courses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #e8f5ef;
            --bg-card:    #ffffff;
            --green:      #2dd882;
            --green-dark: #1ab866;
            --ink:        #0d0d0d;
            --ink-soft:   #2e2e2e;
            --muted:      #6b7a72;
            --border:     #c8dfd4;
            --error:      #d93025;
            --radius:     14px;
            --nav-h:      68px;
        }

        html, body { min-height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle, rgba(0,0,0,0.055) 1px, transparent 1px);
            background-size: 28px 28px;
            background-color: var(--bg);
            color: var(--ink);
        }

        /* ══════════ NAV ══════════ */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--nav-h);
            background: rgba(232,245,239,0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 36px;
            gap: 14px;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 100px;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            transition: color 0.15s, border-color 0.15s;
        }

        .nav-back svg { width: 14px; height: 14px; }
        .nav-back:hover { color: var(--ink); border-color: var(--ink); }

        .nav-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--ink);
            text-decoration: none;
            margin-right: auto;
        }

        .nav-logo .g { color: var(--green-dark); }

        .nav-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--ink);
            color: #fff;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 100px;
        }

        .nav-pill-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%,100% { opacity:1; }
            50%      { opacity:0.35; }
        }

        .nav-logout {
            font-size: 13px;
            font-weight: 600;
            color: var(--error);
            text-decoration: none;
            padding: 7px 16px;
            border-radius: 100px;
            border: 1.5px solid rgba(217,48,37,0.25);
            transition: background 0.15s, color 0.15s;
        }

        .nav-logout:hover { background: var(--error); color: #fff; }

        /* ══════════ PAGE ══════════ */
        .page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 28px 72px;
        }

        /* ══════════ PAGE HEADER ══════════ */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        ̥
        .page-eyebrow {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 4px;
        }

        .page-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--ink);
            letter-spacing: -0.03em;
        }

        .count-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--ink);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 100px;
        }

        .count-badge span {
            color: var(--green);
        }

        /* ══════════ CARD ══════════ */
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 3px 20px rgba(0,0,0,0.06);
            padding: 30px;
            margin-bottom: 22px;
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }

        .card:nth-child(2) { animation-delay: 0.06s; }
        .card:nth-child(3) { animation-delay: 0.12s; }

        .card-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .card-head-icon {
            width: 36px; height: 36px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .card-head-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.02em;
        }

        /* ══════════ FORM ══════════ */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 18px;
        }

        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

        .form-group { display: flex; flex-direction: column; gap: 7px; }
        .form-group.full { grid-column: 1 / -1; }

        label {
            font-size: 12.5px;
            font-weight: 600;
            color: var(--ink-soft);
            letter-spacing: 0.02em;
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px; height: 16px;
            color: #9ab5a6;
            pointer-events: none;
        }

        .textarea-icon {
            position: absolute;
            left: 13px;
            top: 14px;
            width: 16px; height: 16px;
            color: #9ab5a6;
            pointer-events: none;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 11px 14px 11px 40px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--ink);
            background: #fff;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        input::placeholder, textarea::placeholder { color: #b0c8bc; }

        input:focus, textarea:focus {
            border-color: var(--green-dark);
            box-shadow: 0 0 0 4px rgba(26,184,102,0.11);
        }

        textarea {
            min-height: 96px;
            resize: vertical;
            padding-top: 11px;
        }

        .form-actions { display: flex; align-items: center; gap: 12px; margin-top: 6px; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 11px 22px;
            border: none;
            border-radius: 100px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.01em;
            transition: transform 0.14s, box-shadow 0.18s, background 0.18s;
        }

        .btn svg { width: 15px; height: 15px; }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: var(--ink);
            color: #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.16);
        }

        .btn-primary:hover { background: #1a1a1a; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

        .btn-ghost {
            background: var(--bg);
            color: var(--ink-soft);
            border: 1.5px solid var(--border);
            box-shadow: none;
        }

        .btn-ghost:hover { border-color: var(--ink); }

        /* ══════════ TABLE ══════════ */
        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: var(--bg);
        }

        th {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 13px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            font-size: 13.5px;
            color: var(--ink-soft);
            padding: 14px 16px;
            border-bottom: 1px solid rgba(200,223,212,0.5);
            vertical-align: top;
        }

        tbody tr:last-child td { border-bottom: none; }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover { background: #f4fbf7; }

        .td-id {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
        }

        .td-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            color: var(--ink);
        }

        .td-desc {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
            max-width: 360px;
        }

        .empty-row td {
            text-align: center;
            padding: 40px 16px;
            color: var(--muted);
            font-size: 13.5px;
        }

        .empty-emoji {
            font-size: 28px;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<!-- ══════ NAV ══════ -->
<nav>
    <a href="/admin/dashboard" class="nav-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Dashboard
    </a>

    <a href="/" class="nav-logo" style="margin-left:16px;">Exam<span class="g">Sphere</span></a>

    <div class="nav-pill">
        <div class="nav-pill-dot"></div>
        Admin Panel
    </div>

    <a href="/login" class="nav-logout">Logout</a>
</nav>

<!-- ══════ PAGE ══════ -->
<div class="page">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <div class="page-title-group">
            <div class="page-eyebrow">Admin · Courses</div>
            <div class="page-title">Course Management</div>
        </div>
        <div class="count-badge">
            <span th:text="${#lists.size(courses)}">0</span> Courses
        </div>
    </div>

    <!-- ADD COURSE FORM -->
    <div class="card">
        <div class="card-head">
            <div class="card-head-icon">➕</div>
            <div class="card-head-title">Add New Course</div>
        </div>

        <form action="/admin/courses" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label for="courseName">Course Name</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                        <input type="text" id="courseName" name="courseName"
                               placeholder="e.g. Full Stack Development" required>
                    </div>
                </div>

                <div class="form-group">
                    <!-- spacer keeps layout balanced on larger screens -->
                </div>

                <div class="form-group full">
                    <label for="description">Description</label>
                    <div class="input-wrap">
                        <svg class="textarea-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6"/>
                            <line x1="8" y1="12" x2="21" y2="12"/>
                            <line x1="8" y1="18" x2="21" y2="18"/>
                            <line x1="3" y1="6" x2="3.01" y2="6"/>
                            <line x1="3" y1="12" x2="3.01" y2="12"/>
                            <line x1="3" y1="18" x2="3.01" y2="18"/>
                        </svg>
                        <textarea id="description" name="description"
                                  placeholder="Brief description of what this course covers…"
                                  style="padding-left:40px;" required></textarea>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Add Course
                </button>
                <button type="reset" class="btn btn-ghost">Clear</button>
            </div>
        </form>
    </div>

    <!-- COURSE LIST -->
    <div class="card">
        <div class="card-head">
            <div class="card-head-icon">📚</div>
            <div class="card-head-title">Available Courses</div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Course Name</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(courses)}" class="empty-row">
                        <td colspan="3">
                            <span class="empty-emoji">📭</span>
                            No courses added yet. Use the form above to create one.
                        </td>
                    </tr>

                    <tr th:each="course : ${courses}">
                        <td class="td-id" th:text="${course.id}">1</td>
                        <td class="td-name" th:text="${course.courseName}">Course Name</td>
                        <td class="td-desc" th:text="${course.description}">Description here.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
