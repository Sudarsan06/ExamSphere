<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Courses</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h1 {
            color: #059669;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        h2 {
            margin-top: 0;
            color: #111827;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: #059669;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #047857;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #f9fafb;
        }

        .empty {
            text-align: center;
            color: #6b7280;
            padding: 20px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #059669;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>Course Management</h1>

    <!-- Add Course Form -->
    <div class="card">
        <h2>Add New Course</h2>

        <form action="/admin/courses" method="post">
            <label>Course Name</label>
            <input type="text" name="courseName" required>

            <label>Description</label>
            <textarea name="description" required></textarea>

            <button type="submit">Add Course</button>
        </form>
    </div>

    <!-- Course List -->
    <div class="card">
        <h2>Available Courses</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Course Name</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(courses)}">
                    <td colspan="3" class="empty">No courses added yet.</td>
                </tr>

                <tr th:each="course : ${courses}">
                    <td th:text="${course.id}"></td>
                    <td th:text="${course.courseName}"></td>
                    <td th:text="${course.description}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="/login" class="back-link">Back to Login</a>

</div>
</body>
</html>
