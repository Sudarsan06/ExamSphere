<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Exam Already Attempted</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0a0a0f;
            --off-white: #f5f4ef;
            --green: #00c67a;
            --green-dim: #00c67a22;
            --green-mid: #00c67a55;
            --red: #ef4444;
            --red-dim: #ef444418;
            --red-mid: #ef444440;
            --muted: #888898;
            --border: #e2e1db;
            --border-dark: #2a2a38;
            --radius: 18px;
        }

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--off-white);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ─── NOISE OVERLAY ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ─── SUBTLE RED GLOW ─── */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--red-mid) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* ─── NAVBAR ─── */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 72px;
            background: rgba(245,244,239,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--ink);
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .logo span { color: var(--green); }

        /* ─── MAIN ─── */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        /* ─── CARD ─── */
        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 56px 52px;
            max-width: 540px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }

        /* red top accent bar */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--red);
        }

        /* ─── ICON ─── */
        .icon-wrap {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: var(--red-dim);
            border: 1px solid var(--red-mid);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 28px;
        }

        /* ─── BADGE ─── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--red);
            background: var(--red-dim);
            border: 1px solid var(--red-mid);
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 28px;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
        }

        /* ─── TEXT ─── */
        .card h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--ink);
            margin-bottom: 14px;
            line-height: 1.1;
        }

        .card p {
            font-size: 15px;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.75;
            margin-bottom: 40px;
        }

        /* ─── DIVIDER ─── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 0 36px;
        }

        /* ─── BUTTON ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--ink);
            color: var(--off-white);
            padding: 16px 32px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .btn::before {
            content: '←';
            transition: transform 0.2s;
        }

        .btn:hover {
            background: var(--green);
            color: var(--ink);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,198,122,0.25);
        }

        .btn:hover::before {
            transform: translateX(-4px);
        }

        /* ─── FOOTER ─── */
        footer {
            background: var(--ink);
            border-top: 1px solid var(--border-dark);
            padding: 24px 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        footer .logo { color: white; }
        footer p { color: #333344; font-size: 13px; }

        /* ─── MOBILE ─── */
        @media (max-width: 768px) {
            .navbar { padding: 16px 18px; }
            .main   { padding: 40px 16px; }

            .card {
                padding: 40px 28px;
                border-radius: 20px;
            }

            .card h1 { font-size: 22px; }

            footer {
                padding: 20px 18px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/" class="logo">Exam<span>Sphere</span></a>
</nav>

<!-- MAIN -->
<div class="main">
    <div class="card">

        <div class="badge">Access Denied</div>

        <div class="icon-wrap">🚫</div>

        <h1>Exam Already Attempted</h1>
        <p th:text="${message}">You have already submitted this exam and cannot attempt it again.</p>

        <div class="divider"></div>

        <a href="/login" class="btn">Back</a>

    </div>
</div>

<!-- FOOTER -->
<footer>
    <div class="logo">Exam<span>Sphere</span></div>
    <p>© 2026 ExamSphere. All Rights Reserved.</p>
</footer>

</body>
</html>
